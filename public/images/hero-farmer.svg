<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Farmer placeholder">
  <defs>
    <linearGradient id="g1" x1="0" x2="1">
      <stop offset="0%" stop-color="#e6f4ea" />
      <stop offset="100%" stop-color="#ffffff" />
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#g1)" />

  <!-- simple farmer figure -->
  <g transform="translate(220,140)">
    <!-- body -->
    <ellipse cx="320" cy="360" rx="160" ry="200" fill="#dbeee0" />
    <!-- head -->
    <circle cx="320" cy="220" r="60" fill="#f6e6d6" />
    <!-- hat -->
    <rect x="260" y="180" width="120" height="24" rx="12" fill="#2f855a" />
    <rect x="300" y="160" width="80" height="28" rx="10" fill="#2f855a" />
    <!-- eyes/mouth -->
    <circle cx="305" cy="218" r="4" fill="#10212a" />
    <circle cx="335" cy="218" r="4" fill="#10212a" />
    <path d="M300 238 q20 18 40 0" stroke="#10212a" stroke-width="3" fill="none" stroke-linecap="round" />

    <!-- basket of produce -->
    <g transform="translate(140,280)">
      <rect x="-40" y="-10" width="220" height="120" rx="30" fill="#fff5e6" stroke="#f1c27d" stroke-width="4" />
      <circle cx="30" cy="30" r="24" fill="#e53e3e" />
      <circle cx="80" cy="10" r="20" fill="#48bb78" />
      <circle cx="120" cy="40" r="18" fill="#f6e05e" />
    </g>
  </g>

  <!-- background hills -->
  <g transform="translate(0,440)">
    <path d="M0 200 C200 100 400 120 800 200 L1200 200 L1200 320 L0 320 Z" fill="#dff6e7" />
  </g>

  <text x="48" y="760" font-family="Inter, Arial, sans-serif" font-size="20" fill="#0f172a">Placeholder: hero-farmer.svg — replace with your image</text>
</svg>
